<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #080808;
    --card-bg: #111111;
    --gold: #c5a059;
    --gold-glow: rgba(197, 160, 89, 0.3);
    --text-main: #ffffff;
    --text-sec: #888;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 800px;
    height: 680px;
    overflow: hidden;
    background-color: #0d1117;
    background-image: radial-gradient(circle, rgba(197,160,89,0.20) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    perspective: 1200px;
  }
  .cardCar {
    position: relative;
    width: 380px;
    height: 580px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
  }
  .cardCar:hover { transform: scale(1.05) rotateY(-5deg); }
  .cardInnerBackground {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    background-image:
      radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent),
      linear-gradient(135deg, #111 0%, #050505 100%);
    border-radius: 40px;
    border: 1px solid rgba(212, 175, 55, 0.4);
    overflow: hidden;
    z-index: 0;
    box-shadow: 0 30px 60px rgba(0,0,0,0.7);
  }
  .cardInnerBackground::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(255,255,255,0.1) 45%,
      rgba(255,255,255,0.2) 50%,
      rgba(255,255,255,0.1) 55%,
      transparent 100%
    );
    transform: skewX(-20deg);
    transition: left 0.7s cubic-bezier(0.3, 1, 0.2, 1);
    pointer-events: none;
  }
  .cardCar:hover .cardInnerBackground::after { left: 150%; }
  .cardTitle {
    position: relative;
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    margin: 0;
    transform: translateZ(50px);
    font-style: italic;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    z-index: 10;
  }
  .imgContainer {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    z-index: 20;
  }
  .imgCard {
    width: 110%;
    height: auto;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
    pointer-events: none;
  }
  .contactShadow {
    position: absolute;
    bottom: 60px;
    width: 90%;
    height: 40px;
    background: radial-gradient(ellipse at center, rgba(197,160,89,0.2) 0%, transparent 75%);
    filter: blur(10px);
    z-index: 5;
    transform: translateZ(-20px);
  }
  .reflection {
    transform: scaleY(-1);
    opacity: 0.4;
    margin-top: -95px;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 50%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 50%);
    filter: blur(4px);
  }
  .cardCar:hover .imgContainer { transform: translateX(-110px) scale(1.2) translateZ(4px); }
  .glass-glare {
    position: absolute;
    inset: 0;
    border-radius: 40px;
    background: linear-gradient(125deg, rgba(255,255,255,0.1) 0%, transparent 40%, rgba(255,255,255,0.05) 60%, transparent 100%);
    pointer-events: none;
    z-index: 20;
  }
  .cardBody {
    position: relative;
    display: flex;
    justify-content: space-around;
    padding: 18px 0;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    border: 1px solid rgba(197,160,89,0.2);
    transform: translateZ(60px);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .dash-item { display: flex; flex-direction: column; align-items: center; }
  .dash-label {
    font-size: 0.65rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .dash-value { color: #fff; font-size: 0.85rem; }
  .dash-divider {
    width: 1px;
    height: 25px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    opacity: 0.3;
  }
  .cardFooter {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transform: translateZ(40px);
    z-index: 10;
  }
  .price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: #fff;
    margin: 0;
  }
  .btn {
    background: linear-gradient(135deg, var(--gold) 0%, #8a6d3b 100%);
    border: none;
    padding: 12px 25px;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px var(--gold-glow);
    filter: brightness(1.2);
  }
</style>
</head>
<body>
  <article class="cardCar">
    <div class="cardInnerBackground"></div>
    <h3 class="cardTitle">
      Ford Mustang
      <span style="display:block; font-family:'Inter'; font-size:0.7rem; color:var(--text-sec); font-style:normal; letter-spacing:2px; margin-top:5px;">PREMIUM EDITION</span>
    </h3>
    <div class="glass-glare"></div>
    <div class="imgContainer">
      <img class="imgCard" src="media/fordMustang.png" alt="Ford Mustang">
      <div class="contactShadow"></div>
      <img class="imgCard reflection" src="media/fordMustang.png" alt="">
    </div>
    <div class="cardBody">
      <div class="dash-item">
        <span class="dash-label">Power</span>
        <span class="dash-value">480 HP</span>
      </div>
      <div class="dash-divider"></div>
      <div class="dash-item">
        <span class="dash-label">Engine</span>
        <span class="dash-value">V8 5.0L</span>
      </div>
      <div class="dash-divider"></div>
      <div class="dash-item">
        <span class="dash-label">Speed</span>
        <span class="dash-value">250 KM/H</span>
      </div>
    </div>
    <div class="cardFooter">
      <p class="price">€ 42.500</p>
      <button class="btn">Drive Now</button>
    </div>
  </article>
</body>
</html>
